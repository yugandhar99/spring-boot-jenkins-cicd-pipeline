version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: professor-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: springboot3
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: professor-management-api:latest
    container_name: professor-management-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: springboot3
      DB_USERNAME: root
      DB_PASSWORD: root
      DDL_AUTO: update
      SHOW_SQL: "false"

volumes:
  mysql_data:
